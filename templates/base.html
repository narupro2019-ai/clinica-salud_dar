<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Salud + Dar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h1 class="text-center mb-4 text-primary">🏥 Clínica Salud ⛨ Dar</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="mb-4">
            <a href="{{ url_for('index') }}" class="btn btn-outline-primary">📋 Citas</a>
            <a href="{{ url_for('register_patient') }}" class="btn btn-success">+ Paciente</a>
            <a href="{{ url_for('register_doctor') }}" class="btn btn-primary">+ Médico</a>
            <a href="{{ url_for('new_appointment') }}" class="btn btn-warning">📅 Nueva Cita</a>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

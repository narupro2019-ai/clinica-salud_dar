{% extends "base.html" %}
{% block content %}
<h2>Finalizar Cita - Recomendaciones</h2>

<div class="card mb-4">
    <div class="card-body">
        <h5>Paciente: {{ cita['paciente'] }} <small class="text-muted">({{ cita['paciente_id'] }})</small></h5>
        <h5>Médico: {{ cita['medico'] }} <small class="text-muted">({{ cita['medico_id'] }})</small></h5>
        <p><strong>Fecha:</strong> {{ cita['fecha'] }}</p>
    </div>
</div>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Recomendaciones Médicas</label>
        <textarea name="recomendaciones" class="form-control" rows="8" placeholder="Escriba aquí las indicaciones, tratamiento, observaciones..." required></textarea>
    </div>
    <button type="submit" class="btn btn-success">Guardar Recomendaciones</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
